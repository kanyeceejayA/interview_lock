# NOTE: the Worker name MUST be "interview" — that is the service the GitHub
# (Workers Builds) integration deploys to. If this says anything else, the CI
# overrides it and warns on every build. Keep it as "interview".
name = "interview"
main = "src/worker.js"
compatibility_date = "2025-06-01"

# Live at https://interview.kakbr800.workers.dev
workers_dev = true
preview_urls = false   # don't expose per-version preview URLs to candidates

[vars]
# Tab/app switches allowed before the hard "blocked" screen shows.
MAX_STRIKES = "5"

# PIN the on-site supervisor types into the lock screen to reset a candidate.
# CHANGE THIS before deploying.
SUPERVISOR_PIN = "1212"

# Key to view the integrity log at /__lock/admin?key=...  CHANGE THIS.
ADMIN_KEY = "change-me-to-something-long"

# ---- Persistent event log (D1) — ACTIVE -----------------------------------
# Powers /__lock/admin. Do NOT comment this out, or builds deploy without the
# DB binding and the admin page shows "No database bound".
[[d1_databases]]
binding = "DB"
database_name = "interview-lock-log"
database_id = "d9772e90-6e95-4840-8524-932b1f3e15f7"
